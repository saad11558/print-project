<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - PrintShop</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-page {
      background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
  </style>
</head>
<body class="login-page">

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <div class="login-container animate-fade-in-up">
    <div class="login-card">
      <div class="login-header text-center">
        <a href="index.html" class="logo justify-center mb-3">
          <div class="logo-icon" style="font-size:2rem; line-height:1;">🖨️</div>
          <span style="font-size:1.5rem;">Print<strong>Shop</strong></span>
        </a>
        <h2 style="font-size:1.5rem; margin-bottom:8px; font-weight:700;">Create New Password</h2>
        <p class="text-secondary text-sm" id="reset-desc">Enter your new password below.</p>
      </div>

      <div id="error-state" class="hidden text-center" style="padding:20px 0;">
        <div style="font-size:3rem; margin-bottom:12px;">⚠️</div>
        <h3 style="color:var(--danger); margin-bottom:8px;">Invalid Reset Link</h3>
        <p class="text-muted text-sm mb-4">The password reset link is missing, invalid, or has expired.</p>
        <a href="forgot-password.html" class="btn btn-outline btn-block">Request New Link</a>
      </div>

      <form id="reset-form" class="login-form">
        <div class="form-group">
          <label class="form-label" for="new-password">New Password</label>
          <div class="input-with-icon">
            <span class="input-icon">🔒</span>
            <input type="password" id="new-password" class="form-input" placeholder="Min 6 characters" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <div class="input-with-icon">
            <span class="input-icon">🔒</span>
            <input type="password" id="confirm-password" class="form-input" placeholder="Confirm your new password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top:24px;">
          Update Password
        </button>
      </form>
    </div>
  </div>

  <script>
    // Toast logic
    function showToast(type, title, message) {
      const container = document.getElementById('toast-container');
      const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<div class="toast-icon">${icons[type] || 'i'}</div><div class="toast-content"><div class="toast-title">${title}</div><div class="toast-message">${message}</div></div><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
      container.appendChild(toast);
      setTimeout(() => { if(toast.parentElement) toast.remove(); }, 5000);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('reset-form').classList.add('hidden');
      document.getElementById('reset-desc').classList.add('hidden');
      document.getElementById('error-state').classList.remove('hidden');
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const p1 = document.getElementById('new-password').value;
      const p2 = document.getElementById('confirm-password').value;
      
      if (p1 !== p2) {
        return showToast('warning', 'Mismatch', 'Passwords do not match');
      }
      if (p1.length < 6) {
        return showToast('warning', 'Too Short', 'Password must be at least 6 characters');
      }

      const btn = e.target.querySelector('button');
      const ogText = btn.textContent;
      btn.textContent = 'Updating...';
      btn.disabled = true;

      try {
        const res = await fetch('http://localhost:3000/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: p1 })
        });
        const data = await res.json();
        
        if (res.ok) {
          showToast('success', 'Success', 'Password updated! Redirecting to login...');
          setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        } else {
          showToast('error', 'Failed', data.error);
          btn.textContent = ogText;
          btn.disabled = false;
        }
      } catch (err) {
        showToast('error', 'Error', 'Network error occurred.');
        btn.textContent = ogText;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
