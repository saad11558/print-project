<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - PrintShop</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-page {
      background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
  </style>
</head>
<body class="login-page">

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <div class="login-container animate-fade-in-up">
    <div class="login-card">
      <div class="login-header text-center">
        <a href="index.html" class="logo justify-center mb-3">
          <div class="logo-icon" style="font-size:2rem; line-height:1;">🖨️</div>
          <span style="font-size:1.5rem;">Print<strong>Shop</strong></span>
        </a>
        <h2 style="font-size:1.5rem; margin-bottom:8px; font-weight:700;">Reset Password</h2>
        <p class="text-secondary text-sm">Enter your registered email and role to receive a reset link.</p>
      </div>

      <form id="forgot-form" class="login-form">
        <div class="form-group">
          <label class="form-label" for="role-select">Account Role</label>
          <select id="role-select" class="form-input" required>
            <option value="student">Student</option>
            <option value="coordinator">Coordinator</option>
            <option value="shop">Shop Owner</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-with-icon">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" class="form-input" placeholder="you@university.edu" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top:24px;">
          Send Reset Link
        </button>
      </form>
      
      <div id="success-msg" class="hidden" style="margin-top:20px; padding:16px; background:#d1fae5; color:#065f46; border-radius:8px; text-align:center; font-size:14px;">
        <p><strong>Link Sent!</strong></p>
        <p>Check your email for the password reset link.</p>
        <p class="text-muted" style="margin-top:8px; font-size:12px;">(For demo purposes, the link is output directly in the Node.js server console).</p>
      </div>

      <div class="login-footer text-center" style="margin-top: 24px;">
        <a href="login.html" class="text-primary font-semibold" style="text-decoration:none;">&larr; Back to Role Selection</a>
      </div>
    </div>
  </div>

  <script>
    // Simple Toast implementation
    function showToast(type, title, message) {
      const container = document.getElementById('toast-container');
      const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<div class="toast-icon">${icons[type] || 'i'}</div><div class="toast-content"><div class="toast-title">${title}</div><div class="toast-message">${message}</div></div><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
      container.appendChild(toast);
      setTimeout(() => { if(toast.parentElement) toast.remove(); }, 5000);
    }

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const role = document.getElementById('role-select').value;
      
      const btn = e.target.querySelector('button');
      const ogText = btn.textContent;
      btn.textContent = 'Sending...';
      btn.disabled = true;

      try {
        const res = await fetch('http://localhost:3000/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, role })
        });
        const data = await res.json();
        
        if (res.ok) {
          document.getElementById('forgot-form').classList.add('hidden');
          document.getElementById('success-msg').classList.remove('hidden');
          showToast('success', 'Email Sent', 'Check your server console for the reset link.');
        } else {
          showToast('error', 'Failed', data.error);
          btn.textContent = ogText;
          btn.disabled = false;
        }
      } catch (err) {
        showToast('error', 'Error', 'Network error occurred.');
        btn.textContent = ogText;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
